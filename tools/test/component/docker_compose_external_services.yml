# See external_services_env_vars.sh for env vars used in this file

services:
    otel-php-distro-tests-component-mysql:
        image: mysql:8.0
        restart: always
        environment:
            - MYSQL_DATABASE=${OTEL_PHP_TESTS_MYSQL_DB}
            - MYSQL_ROOT_PASSWORD=${OTEL_PHP_TESTS_MYSQL_PASSWORD}
        command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci --default-authentication-plugin=mysql_native_password
        healthcheck:
            test: [ "CMD", "mysqladmin", "--host=localhost", "--user=${OTEL_PHP_TESTS_MYSQL_USER}", "--password=${OTEL_PHP_TESTS_MYSQL_PASSWORD}", "ping" ]
            timeout: 5s
            retries: 60
        networks:
            - otel-php-distro-tests-component-network

    otel-php-distro-tests-component-postgresql:
        image: postgres:17.5
        restart: always
        environment:
            - POSTGRES_DB=${OTEL_PHP_TESTS_POSTGRESQL_DB}
            - POSTGRES_USER=${OTEL_PHP_TESTS_POSTGRESQL_USER}
            - POSTGRES_PASSWORD=${OTEL_PHP_TESTS_POSTGRESQL_PASSWORD}
        healthcheck:
            test: [ "CMD-SHELL", "PGPASSWORD=${OTEL_PHP_TESTS_POSTGRESQL_PASSWORD} psql -U ${OTEL_PHP_TESTS_POSTGRESQL_USER} -d ${OTEL_PHP_TESTS_POSTGRESQL_DB} -h 127.0.0.1 -c 'SELECT 1'" ]
            timeout: 5s
            retries: 60
        networks:
            - otel-php-distro-tests-component-network

    otel-php-distro-tests-component-wait-for-all-services-to-start:
        image: busybox
        depends_on:
            otel-php-distro-tests-component-mysql:
                condition: service_healthy
            otel-php-distro-tests-component-postgresql:
                condition: service_healthy

networks:
    otel-php-distro-tests-component-network:
        name: ${OTEL_PHP_TESTS_DOCKER_NETWORK}
        attachable: true
        external: false
